name: Reusable CI/CD Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      docker_username:
        required: true
      docker_password:
        required: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t $env:DOCKER_USERNAME/mini-project:${{ inputs.environment }} .
        shell: powershell
        env:
          DOCKER_USERNAME: ${{ secrets.docker_username }}

      - name: Login to Docker Hub
        run: echo $env:DOCKER_PASSWORD | docker login -u $env:DOCKER_USERNAME --password-stdin
        shell: powershell
        env:
          DOCKER_USERNAME: ${{ secrets.docker_username }}
          DOCKER_PASSWORD: ${{ secrets.docker_password }}

      - name: Push Docker image
        run: docker push $env:DOCKER_USERNAME/mini-project:${{ inputs.environment }}
        shell: powershell
        env:
          DOCKER_USERNAME: ${{ secrets.docker_username }}
          
      - name: Load image into Minikube
        run: minikube image load mini-project:${{ inputs.environment }}
        shell: powershell

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
        shell: powershell

      - name: Verify deployment status
        run: kubectl rollout status deployment/mini-project -n default --timeout=5m
        shell: powershell
