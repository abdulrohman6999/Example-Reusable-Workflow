name: Reusable CI/CD Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      docker_username:
        required: true
      docker_password:
        required: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mini-project:${{ inputs.environment }} .
        shell: bash

      - name: Login to Docker Hub
        run: echo "${{ secrets.docker_password }}" | docker login -u "${{ secrets.docker_username }}" --password-stdin
        shell: bash

      - name: Push Docker image
        run: docker push mini-project:${{ inputs.environment }}
        shell: bash

      - name: Load image into Minikube
        run: minikube image load mini-project:${{ inputs.environment }}
        shell: bash

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
        shell: bash

      - name: Verify deployment status
        run: kubectl rollout status deployment/mini-project -n default --timeout=5m
        shell: bash
